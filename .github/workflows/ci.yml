name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # prisma.config.ts strictly resolves DATABASE_URL at config-load time, so
    # every step that touches the prisma CLI (postinstall, validate, build)
    # needs this set. The value doesn't have to be reachable — none of these
    # commands connect to the database.
    env:
      DATABASE_URL: test

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: prisma validate
        run: pnpm exec prisma validate

      - name: typecheck
        run: pnpm exec tsc --noEmit

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bot

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: fmt
        run: deno fmt --check src/ tests/

      - name: lint
        run: deno lint

      - name: typecheck
        run: deno check --allow-import --unstable-sloppy-imports src/main.ts

      - name: test
        run: deno test --allow-env --allow-net --allow-read --allow-import --unstable-sloppy-imports

  integration_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Pin the major version to match Neon prod. Bump in lockstep with the
    # actual production major after a planned migration. Minor drift is fine.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: budu
          POSTGRES_PASSWORD: budu
          POSTGRES_DB: budu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budu -d budu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://budu:budu@localhost:5432/budu_test?schema=public

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: integration tests
        run: pnpm test:integration
