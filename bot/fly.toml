# budu Telegram bot on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Polling for Telegram + HTTP /health for Fly (keeps machine alive).
# Webhook mode: set BOT_PUBLIC_URL secret — bot switches automatically.

app = "budu"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
  context = ".."

[env]
  PORT = "8080"

[deploy]
  strategy = "immediate"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

# Required on Fly: health check keeps the machine running (polling still uses getUpdates).
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Webhook mode (optional — replaces polling; also needs BOT_PUBLIC_URL secret):
# fly secrets set BOT_PUBLIC_URL=https://budu.fly.dev -a budu
