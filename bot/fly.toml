# budu Telegram bot on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Polling by default (no public URL). Scale stays at 1 via deploy workflow.
# Webhook: fly secrets set BOT_PUBLIC_URL=https://<app>.fly.dev, uncomment
# [http_service] below, redeploy.

app = "budu-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
  context = ".."

[env]
  PORT = "8080"

[deploy]
  strategy = "immediate"

# Lightweight Deno process + cron; no Postgres in the bot VM.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

